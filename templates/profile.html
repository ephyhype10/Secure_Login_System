{% extends "base.html" %}

{% block title %}
Profile
{% endblock %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-8">

        <div class="card mt-4">

            <div class="card-body">

                <h2 class="mb-4">
                    👤 My Profile
                </h2>

                <hr>

                <div class="mb-3">
                    <strong>Username</strong>
                    <p>{{ user.username }}</p>
                </div>

                <div class="mb-3">
                    <strong>Email</strong>
                    <p>{{ user.email }}</p>
                </div>

                <div class="mb-3">
                    <strong>Member Since</strong>
                    <p>{{ user.created_at.strftime("%d %B %Y") }}</p>
                </div>

                <a href="{{ url_for('dashboard') }}"
                   class="btn btn-primary">

                    Dashboard

                </a>

            </div>

        </div>

    </div>

</div>

{% endblock %}
